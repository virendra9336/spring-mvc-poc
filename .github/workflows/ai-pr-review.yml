name: AI PR Review

on:
  workflow_dispatch:
    inputs:
      pr_url:
        description: "Pull Request URL"
        required: true
        type: string

      ai_token:
        description: "AI Token"
        required: true
        type: string

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Call AI Agent
        id: review
        shell: bash
        run: |
          RESPONSE=$(curl -s -X POST "https://your-ai-agent.com/api/review" \
            -H "Content-Type: application/json" \
            -d '{
                  "prUrl":"${{ github.event.inputs.pr_url }}",
                  "githubToken":"${{ secrets.GITHUB_TOKEN }}",
                  "aiToken":"${{ github.event.inputs.ai_token }}"
                }')

          echo "response<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESPONSE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

