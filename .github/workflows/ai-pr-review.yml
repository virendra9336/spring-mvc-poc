name: AI PR Review

on:
  workflow_dispatch:
    inputs:
      pr_url:
        description: "Pull Request URL"
        required: true
        type: string

      ai_token:
        description: "AI Token"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:

      # Print user inputs
      - name: Print User Inputs
        shell: bash
        run: |
          echo "======================================="
          echo "GitHub Action Started"
          echo "======================================="
          echo "PR URL    : ${{ github.event.inputs.pr_url }}"
          echo "AI Token  : ${{ github.event.inputs.ai_token }}"
          echo "======================================="

      # Call AI Agent
      - name: Call AI Agent
        id: review
        shell: bash
        run: |
          echo "Calling AI Agent..."

          RESPONSE=$(curl -s -X POST "https://your-ai-agent.com/api/review" \
            -H "Content-Type: application/json" \
            -d '{
                  "prUrl":"${{ github.event.inputs.pr_url }}",
                  "githubToken":"${{ secrets.GITHUB_TOKEN }}",
                  "aiToken":"${{ github.event.inputs.ai_token }}"
                }')

          echo ""
          echo "========== AI Response =========="
          echo "$RESPONSE"
          echo "================================="

          echo "response<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESPONSE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # Comment on PR
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prUrl = "${{ github.event.inputs.pr_url }}";

            // Example:
            // https://github.com/owner/repo/pull/15

            const parts = prUrl.split("/");

            const owner = parts[3];
            const repo = parts[4];
            const issue_number = Number(parts[6]);

            const response = `${{ steps.review.outputs.response }}`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: response
            });

            console.log("=================================");
            console.log("AI Review comment posted.");
            console.log("Owner :", owner);
            console.log("Repo  :", repo);
            console.log("PR No :", issue_number);
            console.log("=================================");
